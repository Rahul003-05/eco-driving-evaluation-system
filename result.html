<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Result</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: url('{{ bg_image }}') no-repeat center center fixed; background-size: cover; margin: 0; padding: 40px;}
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }
        
        .container { max-width: 900px; margin: auto; }
        .main-card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; border-top: 10px solid {{ color }}; backdrop-filter: blur(10px); margin-bottom: 20px;}
        
        .icon { font-size: 70px; margin-bottom: 10px; }
        h1 { color: {{ color }}; margin: 0 0 10px 0; font-size: 32px; text-transform: uppercase;}
        .sub-text { color: #34495e; font-size: 18px; margin-bottom: 30px; font-weight: bold;}
        
        .insights-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .insight-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: left; border-left: 5px solid #3498db;}
        .insight-box.why { border-color: #9b59b6; }
        .insight-box.tip { border-color: #f1c40f; }
        .insight-box.rec { border-color: #e67e22; }
        .insight-box h3 { margin-top: 0; font-size: 16px; color: #2c3e50; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .insight-box p { color: #7f8c8d; font-size: 14px; line-height: 1.6; margin: 0;}

        .action-buttons { display: flex; justify-content: center; gap: 20px; }
        .btn { text-decoration: none; padding: 15px 40px; background: #2c3e50; color: white; border-radius: 8px; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #1a252f; transform: translateY(-2px);}
        .btn-dash { background: #3498db; }
        .btn-dash:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="main-card">
            <div class="icon">{{ icon }}</div>
            <h1>{{ prediction_text }}</h1>
            <p class="sub-text">{{ sub_text }}</p>
        </div>

        <div class="insights-grid">
            <div class="insight-box why">
                <h3>🔍 Why this result?</h3>
                <p>{{ why_result }}</p>
            </div>
            <div class="insight-box tip">
                <h3>💡 Quick Tip</h3>
                <p>{{ quick_tip }}</p>
            </div>
            <div class="insight-box rec">
                <h3>🎯 Recommendation</h3>
                <p>{{ recommendation }}</p>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/" class="btn">← New Evaluation</a>
            <a href="/graphs" class="btn btn-dash">View Analytics Dashboard →</a>
        </div>
    </div>
</body>
</html>
